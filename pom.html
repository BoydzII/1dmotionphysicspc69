<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics 1D Motion App</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX compilation in browser -->
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    
    :root {
      --font-thai: 'Sarabun', sans-serif;
      --font-math: 'Cambria Math', 'Cambria', 'Times New Roman', serif;
    }

    body {
      font-family: var(--font-thai);
      background-color: #fdfbf7;
      color: #4a4a4a;
    }

    .math-text {
      font-family: var(--font-math);
      font-style: italic;
    }

    .math-num {
      font-family: var(--font-math);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #d4a5a5; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #c38b8b; }

    @keyframes flipIn {
      from { transform: rotateY(90deg); opacity: 0; }
      to { transform: rotateY(0deg); opacity: 1; }
    }
    .flip-anim { animation: flipIn 0.3s ease-out forwards; }
    
    @keyframes fadeInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    // --- Icon System ---
    const Icon = ({ name, size = 20, className = "" }) => (
      <i className={`fa-solid ${name} ${className}`} style={{ fontSize: size }}></i>
    );

    const icons = {
      Play: "fa-play",
      RotateCcw: "fa-rotate-left",
      BookOpen: "fa-book-open",
      PenTool: "fa-pen",
      ArrowLeft: "fa-arrow-left",
      CheckCircle: "fa-circle-check",
      XCircle: "fa-circle-xmark",
      ChevronRight: "fa-chevron-right",
      ChevronLeft: "fa-chevron-left",
      Home: "fa-house",
      Settings: "fa-gear",
      FlipHorizontal: "fa-arrows-rotate"
    };

    // --- UI Helper Components ---
    const Vec = ({ char }) => (
      <span className="inline-flex flex-col items-center justify-end leading-[0.8] align-bottom math-text mx-1 font-bold text-indigo-600">
        <span className="text-[0.6em] mb-[-0.3em] font-normal" style={{ fontStyle: 'normal', fontFamily: 'sans-serif' }}>→</span>
        <span>{char}</span>
      </span>
    );

    const Scalar = ({ char }) => (
      <span className="math-text mx-1 font-bold text-rose-500">{char}</span>
    );

    const MathNum = ({ num }) => (
      <span className="math-num mx-1 font-semibold">{num}</span>
    );

    const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    // --- Flashcard Data ---
    const flashcardsData = [
      {
        id: 1,
        front: <div className="flex flex-col items-center"><span className="text-4xl mb-2"><Vec char="u"/></span><span>ความเร็วต้น</span></div>,
        backTitle: "ความเร็วต้น (Initial Velocity)",
        backDesc: <span>ความเร็วของวัตถุ ณ จุดเริ่มต้นของการสังเกต มีทิศทาง (เวกเตอร์)</span>,
        unit: "m/s",
        condition: <span>🔑 คีย์เวิร์ด: หากโจทย์บอกว่า 'เริ่มจากจุดหยุดนิ่ง' หรือ 'ปล่อยวัตถุตก' ให้รู้ทันทีว่า <Vec char="u"/> = 0</span>
      },
      {
        id: 2,
        front: <div className="flex flex-col items-center"><span className="text-4xl mb-2"><Vec char="v"/></span><span>ความเร็วปลาย</span></div>,
        backTitle: "ความเร็วปลาย (Final Velocity)",
        backDesc: <span>ความเร็วของวัตถุ ณ จุดสิ้นสุดของการสังเกตที่สนใจ มีทิศทาง (เวกเตอร์)</span>,
        unit: "m/s",
        condition: <span>🔑 คีย์เวิร์ด: หากโจทย์บอกว่า 'เบรกจนรถหยุด' หรือ 'เคลื่อนที่จนหยุดนิ่ง' ให้รู้ทันทีว่า <Vec char="v"/> = 0</span>
      },
      {
        id: 3,
        front: <div className="flex flex-col items-center"><div className="flex items-center space-x-4 mb-2"><span className="text-4xl"><Scalar char="s"/></span> <span className="text-xl">vs</span> <span className="text-4xl"><Vec char="s"/></span></div><span>ระยะทาง vs การกระจัด</span></div>,
        backTitle: "ระยะทาง (Scalar) vs การกระจัด (Vector)",
        backDesc: <span>ระยะทาง (<Scalar char="s"/>) คือความยาวตามเส้นทางจริงทั้งหมดที่เดินได้ ส่วนการกระจัด (<Vec char="s"/>) คือเส้นตรงที่ลากจากจุดเริ่มต้นไปยังจุดสุดท้ายเสมอ</span>,
        unit: "m",
        condition: <span>💡 ทริคสำคัญ: ถ้ารถเคลื่อนที่เป็นเส้นตรงไปข้างหน้า 'โดยไม่มีการเลี้ยวกลับ' ขนาดของการกระจัดจะเท่ากับระยะทางพอดีเป๊ะ (|<Vec char="s"/>| = <Scalar char="s"/>)</span>
      },
      {
        id: 4,
        front: <div className="flex flex-col items-center"><span className="text-4xl mb-2"><Vec char="a"/></span><span>ความเร่ง</span></div>,
        backTitle: "ความเร่ง (Acceleration)",
        backDesc: <span>ความเร็วที่เปลี่ยนแปลงไปใน 1 วินาที (เวกเตอร์)</span>,
        unit: "m/s²",
        condition: <span>🔑 ทริค: ความเร่งทิศเดียวกับความเร็วรถจะ 'เร็วขึ้น', แต่ถ้าความเร่งทิศตรงข้าม (หรือเรียกว่า 'ความหน่วง') รถจะ 'ช้าลง'</span>
      },
      {
        id: 5,
        front: <div className="flex flex-col items-center"><span className="text-4xl mb-2"><Scalar char="v"/></span><span>อัตราเร็ว vs ความเร็ว</span></div>,
        backTitle: "อัตราเร็ว (Speed) vs ความเร็ว (Velocity)",
        backDesc: <span>อัตราเร็วคำนวณจาก ระยะทาง/เวลา (สเกลาร์) ส่วนความเร็วคำนวณจาก การกระจัด/เวลา (เวกเตอร์)</span>,
        unit: "m/s",
        condition: <span>💡 ทริค: รถวิ่งเป็นวงกลมกลับมาจุดเดิม อัตราเร็วเฉลี่ย &gt; 0 แต่ความเร็วเฉลี่ย = 0 (เพราะการกระจัดเป็น 0)</span>
      },
      {
        id: 6,
        front: <div className="flex flex-col items-center"><span className="text-4xl mb-2"><Scalar char="t"/></span><span>เวลา</span></div>,
        backTitle: "เวลา (Time)",
        backDesc: <span>ช่วงเวลาที่ใช้ในการเคลื่อนที่หรือการสังเกต เป็นปริมาณสเกลาร์ที่บอกเพียงขนาดเท่านั้น</span>,
        unit: "s",
        condition: <span>💡 ทริค: เวลาเดินหน้าเสมอ ไม่มีทิศทาง และไม่มีค่าติดลบ (<Scalar char="t"/> ≥ 0 เสมอ)</span>
      }
    ];

    // --- Question Bank (80 Unique Templates) ---
    // แต่ละฟังก์ชันสร้างโจทย์ที่ไม่ซ้ำกัน พร้อมสุ่มตัวเลขใหม่ทุกครั้ง
    const questionBank = {
      easy: [
        // Concepts
        () => ({ question: "ปริมาณใดต่อไปนี้เป็น 'ปริมาณสเกลาร์' ทั้งหมด?", options: ["ระยะทาง, อัตราเร็ว, เวลา", "การกระจัด, ความเร็ว", "เวลา, ความเร่ง, อัตราเร็ว", "น้ำหนัก, ระยะทาง"], answer: 0, explanation: "สเกลาร์คือปริมาณที่บอกแค่ 'ขนาด' (ไม่มีทิศทาง) เช่น ระยะทาง อัตราเร็ว และเวลา" }),
        () => ({ question: "ปริมาณใดต่อไปนี้เป็น 'ปริมาณเวกเตอร์' ทั้งหมด?", options: ["มวล, ระยะทาง", "อัตราเร็ว, เวลา", "การกระจัด, ความเร็ว, ความเร่ง", "น้ำหนัก, อัตราเร็ว"], answer: 2, explanation: "เวกเตอร์ต้องบอกทั้ง 'ขนาด' และ 'ทิศทาง' เช่น การกระจัด ความเร็ว ความเร่ง" }),
        () => ({ question: "หน่วยของ 'ความเร่ง' ในระบบ SI คือข้อใด?", options: ["m/s", "m/s²", "km/h", "m²"], answer: 1, explanation: "ความเร่งคือความเร็วที่เปลี่ยนไปต่อหนึ่งหน่วยเวลา (m/s) / s = m/s²" }),
        () => ({ question: "ในการตกแบบเสรี (Free Fall) ความเร่งของวัตถุมีทิศทางอย่างไร?", options: ["ทิศขึ้นเสมอ", "ทิศลงสู่ศูนย์กลางโลกเสมอ", "ทิศทางเดียวกับการเคลื่อนที่", "ไม่มีความเร่ง"], answer: 1, explanation: "การตกแบบเสรีวัตถุจะถูกแรงโน้มถ่วงดึงดูด ทำให้มีความเร่ง g ทิศลงเสมอ" }),
        () => ({ question: "โยนก้อนหินขึ้นไปในแนวดิ่ง ที่จุด 'สูงสุด' ของการเคลื่อนที่ ปริมาณใดมีค่าเป็นศูนย์?", options: ["ความเร่ง", "เวลา", "ความเร็ว", "การกระจัด"], answer: 2, explanation: "ที่จุดสูงสุด วัตถุจะหยุดนิ่งชั่วขณะก่อนตกลงมา ทำให้ความเร็ว (v) เป็น 0 m/s" }),
        () => ({ question: "หากโจทย์ระบุว่ารถ 'เริ่มเคลื่อนที่จากจุดหยุดนิ่ง' หมายความว่าอย่างไร?", options: ["v = 0", "u = 0", "a = 0", "s = 0"], answer: 1, explanation: "เริ่มต้นจากหยุดนิ่ง แปลว่า ความเร็วต้น (u) เป็นศูนย์" }),
        () => ({ question: "หากโจทย์ระบุว่ารถ 'เบรกจนกระทั่งหยุดสนิท' หมายความว่าอย่างไร?", options: ["v = 0", "u = 0", "a = 0", "t = 0"], answer: 0, explanation: "เบรกจนหยุด แปลว่า ความเร็วปลายตอนสุดท้าย (v) เป็นศูนย์" }),
        () => ({ question: "รถยนต์วิ่งวนรอบสนามรูปวงกลม 1 รอบจนกลับมาที่จุดเดิม ข้อใดกล่าวถูกต้อง?", options: ["การกระจัด = 0", "ระยะทาง = 0", "อัตราเร็วเฉลี่ย = 0", "ถูกทั้ง ก. และ ค."], answer: 0, explanation: "จุดเริ่มต้นและจุดสุดท้ายคือจุดเดียวกัน ทำให้การกระจัดเป็น 0 (แต่ระยะทางไม่เป็น 0)" }),
        // Simple Calculations
        () => { let s = rnd(10, 50)*10, t = rnd(2, 10); return { question: <span>รถวิ่งระยะทาง <MathNum num={s}/> เมตร ในเวลา <MathNum num={t}/> วินาที รถมีอัตราเร็วเฉลี่ยเท่าใด?</span>, options: [`${s/t} m/s`, `${s*t} m/s`, `${(s/t)*2} m/s`, `${s-t} m/s`], answer: 0, explanation: <span>v = s/t = {s} / {t} = {s/t} m/s</span> }},
        () => { let v = rnd(10, 30), t = rnd(2, 10); return { question: <span>ม้าวิ่งด้วยอัตราเร็วคงที่ <MathNum num={v}/> m/s เป็นเวลา <MathNum num={t}/> วินาที ม้าจะวิ่งได้ระยะทางเท่าใด?</span>, options: [`${v/t} m`, `${v*t} m`, `${v+t} m`, `${v*t*2} m`], answer: 1, explanation: <span>s = vt = {v} × {t} = {v*t} m</span> }},
        () => { let s = rnd(5, 20)*10, v = rnd(5, 20); return { question: <span>คนเดินด้วยอัตราเร็ว <MathNum num={v}/> m/s ต้องการเดินทาง <MathNum num={s}/> เมตร จะต้องใช้เวลากี่วินาที?</span>, options: [`${s*v} s`, `${s/v} s`, `${(s/v)+5} s`, `${s/v/2} s`], answer: 1, explanation: <span>t = s/v = {s} / {v} = {s/v} s</span> }},
        () => { let g = 10, t = rnd(2, 5); return { question: <span>ปล่อยลูกบอลตกจากตึกสูงแบบเสรี (g = {g} m/s²) เมื่อเวลาผ่านไป <MathNum num={t}/> วินาที ลูกบอลจะมีความเร็วเท่าใด?</span>, options: [`${g*t} m/s`, `${g*t/2} m/s`, `${g+t} m/s`, `${(g*t)*2} m/s`], answer: 0, explanation: <span>ปล่อยแปลว่า u=0; จาก v = u + gt = 0 + ({g})({t}) = {g*t} m/s</span> }},
        () => { let v = rnd(10, 50); return { question: <span>โยนวัตถุขึ้นฟ้าด้วยความเร็ว <MathNum num={v}/> m/s จะใช้เวลากี่วินาทีวัตถุจึงจะขึ้นไปถึงจุดสูงสุด? (g = 10 m/s²)</span>, options: [`${v/10} s`, `${v*10} s`, `${v/5} s`, `${v} s`], answer: 0, explanation: <span>จุดสูงสุด v=0; จาก v = u - gt -> 0 = {v} - 10t -> t = {v}/10 = {v/10} s</span> }},
        () => { let d = rnd(3, 8); return { question: <span>เดินไปทางทิศตะวันออก <MathNum num={d}/> เมตร แล้วเดินต่อไปทางทิศตะวันออกอีก <MathNum num={d*2}/> เมตร การกระจัดลัพธ์เป็นเท่าใด?</span>, options: [`${d*3} เมตร ทางตะวันออก`, `${d} เมตร ทางตะวันตก`, `${d*3} เมตร ทางตะวันตก`, `0 เมตร`], answer: 0, explanation: "ทิศเดียวกันนำขนาดมาบวกกัน และทิศเดิม" }},
        () => { let x = rnd(10, 20), y = rnd(5, x-1); return { question: <span>วิ่งไปทางทิศเหนือ <MathNum num={x}/> เมตร แล้ววิ่งย้อนกลับทางทิศใต้ <MathNum num={y}/> เมตร ระยะทางทั้งหมดคือเท่าใด?</span>, options: [`${x+y} m`, `${x-y} m`, `${x*y} m`, `0 m`], answer: 0, explanation: "ระยะทางคิดตามเส้นทางทั้งหมด นำมาบวกกันเสมอ" }},
        () => { let x = rnd(10, 20), y = rnd(5, x-1); return { question: <span>จากข้อก่อนหน้า (ไปเหนือ <MathNum num={x}/> m กลับใต้ <MathNum num={y}/> m) ขนาดของการกระจัดคือเท่าใด?</span>, options: [`${x+y} m`, `${x-y} m`, `${y} m`, `0 m`], answer: 1, explanation: "การกระจัดคือเส้นตรงจากจุดเริ่มถึงจุดท้าย (ทิศตรงข้ามนำมาลบกัน)" }},
        () => { let u = rnd(1, 5)*10, a = rnd(2, 5), t = rnd(2, 5); return { question: <span>รถมีความเร็วเริ่มต้น <MathNum num={u}/> m/s เหยียบคันเร่งด้วยความเร่ง <MathNum num={a}/> m/s² เวลา <MathNum num={t}/> วินาที ความเร็วสุดท้ายเป็นเท่าใด?</span>, options: [`${u + a*t} m/s`, `${u*t} m/s`, `${u - a*t} m/s`, `${a*t} m/s`], answer: 0, explanation: <span>v = u + at = {u} + ({a})({t}) = {u + a*t} m/s</span> }},
        () => { let v = rnd(20, 50), u = rnd(5, 10), t = rnd(2, 5); return { question: <span>รถเปลี่ยนความเร็วจาก <MathNum num={u}/> m/s เป็น <MathNum num={v}/> m/s ในเวลา <MathNum num={t}/> วินาที รถมีความเร่งเท่าใด?</span>, options: [`${(v-u)/t} m/s²`, `${(v+u)/t} m/s²`, `${v-u} m/s²`, `${(v-u)*t} m/s²`], answer: 0, explanation: <span>a = (v-u)/t = ({v}-{u})/{t} = {(v-u)/t} m/s²</span> }},
        () => ({ question: "ความชัน (Slope) ของกราฟ ความเร็ว-เวลา (v-t) บอกค่าปริมาณใด?", options: ["ความเร่ง (a)", "การกระจัด (s)", "ความเร็ว (v)", "เวลา (t)"], answer: 0, explanation: "Slope ของกราฟ v-t คือ Δv/Δt ซึ่งก็คือความเร่ง" }),
        () => ({ question: "พื้นที่ใต้กราฟ ความเร็ว-เวลา (v-t) บอกค่าปริมาณใด?", options: ["การกระจัด (s)", "ความเร่ง (a)", "อัตราเร็ว (v)", "โมเมนตัม"], answer: 0, explanation: "พื้นที่ใต้กราฟ v-t คือผลคูณของ v × t ซึ่งก็คือการกระจัด" }),
      ],

      // --- New Free Fall Simulation Component ---
      const FreeFallSimulation = () => {
        const [mode, setMode] = useState('drop');

        const [h, setH] = useState(50);
        const [g, setG] = useState(10);

        const safeH = Math.max(0, h);
        const safeG = Math.max(0.1, g);
        
        const totalTime = (actualU + Math.sqrt(actualU * actualU + 2 * safeG * safeH)) / safeG;
        const maxHeight = actualU > 0 ? safeH + (actualU * actualU) / (2 * safeG) : safeH;
        const finalVelocity = actualU - safeG * totalTime; 

        const displayMaxHeight = Math.max(10, maxHeight * 1.15); 
        const getPercent = (val) => Math.max(0, Math.min(100, (val / displayMaxHeight) * 100));

        useEffect(() => {

            setY(safeH);
            setT(0);
            setV(actualU);

            let startTime = performance.now();
            const animate = (currentTime) => {
              const elapsedTime = (currentTime - startTime) / 1000; 
              if (elapsedTime >= totalTime) {
                setT(totalTime);
                setY(0);
                setV(finalVelocity);
                setSimState('finished');
              } else {
                setT(elapsedTime);
                setY(safeH + actualU * elapsedTime - 0.5 * safeG * elapsedTime * elapsedTime);
                setV(actualU - safeG * elapsedTime);
                animRef.current = requestAnimationFrame(animate);
              }
            };
            animRef.current = requestAnimationFrame(animate);
          }
          return () => cancelAnimationFrame(animRef.current);

                <Icon name={icons.ArrowLeft} size={20} className="mr-2" /> กลับหน้าหลัก
              </button>
              
              <div className="flex bg-white rounded-xl p-1 mb-6 shadow-sm border overflow-x-auto whitespace-nowrap">
                 <button onClick={() => {setLearnTab('flashcard'); setIsFlipped(false);}} className={`flex-1 py-2 px-3 text-sm md:text-base text-center rounded-lg font-bold transition-all ${learnTab === 'flashcard' ? 'bg-indigo-100 text-indigo-700' : 'text-gray-500 hover:bg-gray-50'}`}>แฟลชการ์ด</button>
                 <button onClick={() => setLearnTab('sim')} className={`flex-1 py-2 px-3 text-sm md:text-base text-center rounded-lg font-bold transition-all ${learnTab === 'sim' ? 'bg-indigo-100 text-indigo-700' : 'text-gray-500 hover:bg-gray-50'}`}>แนวราบ 2 ช่วง</button>
                 <button onClick={() => setLearnTab('freefall')} className={`flex-1 py-2 px-3 text-sm md:text-base text-center rounded-lg font-bold transition-all ${learnTab === 'freefall' ? 'bg-indigo-100 text-indigo-700' : 'text-gray-500 hover:bg-gray-50'}`}>ตกเสรี (แนวดิ่ง)</button>
              </div>

              {learnTab === 'sim' && <AdvancedSimulation />}
              {learnTab === 'freefall' && <FreeFallSimulation />}

              {learnTab === 'flashcard' && (
                <div className="flex flex-col items-center">
                  <div className="text-gray-500 mb-2 font-bold math-num">{flashcardIdx + 1} / {flashcardsData.length}</div>
                  <div className="relative w-full max-w-md perspective-1000 mb-8 cursor-pointer group" onClick={() => setIsFlipped(!isFlipped)}>
                    <div className={`w-full min-h-[320px] bg-white rounded-3xl shadow-lg border-2 ${isFlipped ? 'border-rose-200' : 'border-indigo-100'} p-8 flex flex-col justify-center items-center text-center transition-all duration-300 transform group-hover:shadow-xl`}>
                      <div key={isFlipped ? 'back' : 'front'} className="flip-anim w-full">
                        {!isFlipped ? (
                          <div className="text-3xl font-bold text-gray-800 flex flex-col items-center">
                            {card.front}
                            <p className="text-sm text-gray-400 mt-6 font-normal flex items-center"><Icon name={icons.FlipHorizontal} size={16} className="mr-2"/> แตะเพื่อพลิกดูความหมาย</p>
                          </div>
                        ) : (
                          <div className="flex flex-col items-center w-full">
                             <h3 className="text-2xl font-bold text-indigo-600 mb-4">{card.backTitle}</h3>
                             <div className="text-gray-700 mb-4 leading-relaxed font-medium">{card.backDesc}</div>
                             <div className="bg-gray-100 px-4 py-1 rounded-full text-sm text-gray-600 font-bold mb-6">หน่วย: <span className="math-num text-indigo-600 ml-1">{card.unit}</span></div>
                             {card.condition && (
                               <div className="bg-rose-50 border border-rose-100 text-rose-700 p-4 rounded-xl text-left w-full text-sm font-medium">{card.condition}</div>
                             )}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                  <div className="flex space-x-6">
                    <button onClick={prevCard} className="p-4 bg-white rounded-full shadow border hover:bg-gray-50 text-indigo-500"><Icon name={icons.ChevronLeft} size={24}/></button>
                    <button onClick={nextCard} className="p-4 bg-white rounded-full shadow border hover:bg-gray-50 text-indigo-500"><Icon name={icons.ChevronRight} size={24}/></button>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderTestSetup = () => (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-gradient-to-br from-rose-50 via-orange-50 to-amber-50">
          <div className="w-full max-w-md">
            <button onClick={() => setCurrentScreen('home')} className="flex items-center text-gray-600 hover:text-rose-500 mb-6 transition-colors">
              <Icon name={icons.ArrowLeft} size={20} className="mr-2" /> กลับหน้าหลัก
            </button>

            <div className="bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-xl border border-white/50">
              <div className="flex items-center justify-center w-16 h-16 bg-rose-100 text-rose-500 rounded-full mx-auto mb-4">
                <Icon name={icons.Settings} size={32} />
              </div>
              <h2 className="text-2xl font-bold text-center text-gray-800 mb-8">ตั้งค่าแบบทดสอบ</h2>

              <div className="mb-6">
                <label className="block text-sm font-semibold text-gray-600 mb-3">ระดับความยาก</label>
                <div className="grid grid-cols-2 gap-3">
                  {[
                    { id: 'easy', label: 'ง่าย (Easy)', color: 'bg-emerald-100 text-emerald-700 border-emerald-200' },
                    { id: 'medium', label: 'ปานกลาง (Medium)', color: 'bg-blue-100 text-blue-700 border-blue-200' },
                    { id: 'hard', label: 'ยาก (Hard)', color: 'bg-amber-100 text-amber-700 border-amber-200' },
                    { id: 'veryHard', label: 'ยากมาก (Very Hard)', color: 'bg-rose-100 text-rose-700 border-rose-200' },
                  ].map(lvl => (
                    <button
                      key={lvl.id}
                      onClick={() => setTestConfig({...testConfig, difficulty: lvl.id})}
                      className={`p-3 rounded-xl border transition-all ${testConfig.difficulty === lvl.id ? `ring-2 ring-offset-2 ring-${lvl.color.split('-')[1]}-400 ${lvl.color}` : 'bg-gray-50 text-gray-600 border-gray-200 hover:bg-gray-100'}`}
                    >
                      <div className="font-semibold">{lvl.label}</div>
                    </button>
                  ))}
                </div>
              </div>

              <div className="mb-8">
                <label className="block text-sm font-semibold text-gray-600 mb-3">จำนวนข้อ (ไม่ซ้ำ)</label>
                <div className="flex space-x-3">
                  {[5, 10, 20].map(num => (
                    <button
                      key={num}
                      onClick={() => setTestConfig({...testConfig, amount: num})}
                      className={`flex-1 py-3 rounded-xl border transition-all ${testConfig.amount === num ? 'bg-indigo-100 text-indigo-700 border-indigo-300 ring-2 ring-offset-2 ring-indigo-400 font-bold' : 'bg-gray-50 text-gray-600 border-gray-200 hover:bg-gray-100'}`}
                    >
                      <span className="math-num text-lg">{num}</span> ข้อ
                    </button>
                  ))}
                </div>
              </div>

              <button onClick={startTest} className="w-full py-4 bg-gradient-to-r from-rose-400 to-pink-500 hover:from-rose-500 hover:to-pink-600 text-white rounded-2xl font-bold text-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 flex justify-center items-center">
                เริ่มทำแบบทดสอบ <Icon name={icons.Play} size={20} className="ml-2" />
              </button>
            </div>
          </div>
        </div>
      );

      const renderTesting = () => {
        const q = testData[currentQuestionIdx];
        const progress = ((currentQuestionIdx) / testData.length) * 100;

        return (
          <div className="min-h-screen bg-slate-50 p-4 sm:p-6 pb-24 flex flex-col items-center">
            <div className="w-full max-w-2xl">
              <div className="flex justify-between items-center mb-4">
                <button 
                  onClick={() => { if(window.confirm('ต้องการออกจากการทดสอบใช่หรือไม่? คะแนนจะไม่ถูกบันทึก')) setCurrentScreen('home'); }}
                  className="text-gray-400 hover:text-rose-500 transition-colors"
                >
                  <Icon name={icons.XCircle} size={24} />
                </button>
                <div className="text-gray-500 font-semibold math-num">
                  {currentQuestionIdx + 1} / {testData.length}
                </div>
              </div>
              
              <div className="w-full bg-gray-200 rounded-full h-2 mb-8 overflow-hidden">
                <div className="bg-indigo-500 h-2 rounded-full transition-all duration-300 ease-out" style={{ width: `${progress}%` }}></div>
              </div>

              <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-md border border-gray-100 mb-6 min-h-[150px] flex items-center justify-center text-center">
                <h3 className="text-xl sm:text-2xl font-bold text-gray-800 leading-relaxed">{q.question}</h3>
              </div>

              <div className="space-y-3">
                {q.options.map((opt, idx) => {
                  let btnClass = "w-full p-4 rounded-2xl text-left font-medium border-2 transition-all duration-200 ";
                  if (!isAnswered) {
                    btnClass += selectedAnswer === idx ? "border-indigo-400 bg-indigo-50 text-indigo-700" : "border-gray-100 bg-white hover:border-indigo-200 hover:bg-indigo-50/50 text-gray-700";
                  } else {
                    if (idx === q.answer) btnClass += "border-emerald-400 bg-emerald-50 text-emerald-700 shadow-sm"; 
                    else if (idx === selectedAnswer) btnClass += "border-rose-400 bg-rose-50 text-rose-700"; 
                    else btnClass += "border-gray-100 bg-gray-50 text-gray-400 opacity-50"; 
                  }

                  return (
                    <button key={idx} disabled={isAnswered} onClick={() => handleAnswer(idx)} className={btnClass}>
                      <div className="flex justify-between items-center">
                        <span className="text-lg math-num">{opt}</span>
                        {isAnswered && idx === q.answer && <Icon name={icons.CheckCircle} size={20} className="text-emerald-500" />}
                        {isAnswered && idx === selectedAnswer && idx !== q.answer && <Icon name={icons.XCircle} size={20} className="text-rose-500" />}
                      </div>
                    </button>
                  );
                })}
              </div>

              {isAnswered && (
                <div className="mt-8 animate-fade-in-up">
                  <div className="bg-indigo-50/80 p-5 rounded-2xl border border-indigo-100 mb-6 text-indigo-900">
                    <span className="font-bold flex items-center mb-2"><Icon name={icons.BookOpen} size={18} className="mr-2"/> คำอธิบาย:</span>
                    <div className="text-sm sm:text-base opacity-90 leading-relaxed">{q.explanation}</div>
                  </div>

                  <button onClick={nextQuestion} className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-md flex justify-center items-center transition-colors">
                    {currentQuestionIdx + 1 < testData.length ? 'ข้อถัดไป' : 'ดูผลคะแนน'} <Icon name={icons.ChevronRight} size={20} className="ml-2" />
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderResult = () => {
        const percentage = (score / testData.length) * 100;
        let message = ""; let colorClass = "";
        if (percentage >= 80) { message = "ยอดเยี่ยมมาก! อนาคตนักฟิสิกส์"; colorClass = "text-emerald-500"; }
        else if (percentage >= 50) { message = "ทำได้ดี! ฝึกอีกนิดจะเก่งขึ้นแน่นอน"; colorClass = "text-amber-500"; }
        else { message = "พยายามเข้านะ! ทบทวนบทเรียนอีกรอบ"; colorClass = "text-rose-500"; }

        return (
          <div className="min-h-screen bg-slate-50 p-6 flex flex-col items-center justify-center">
            <div className="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl text-center">
              <div className="w-32 h-32 mx-auto bg-gray-50 rounded-full flex items-center justify-center border-4 border-dashed border-gray-200 mb-6 relative">
                 <div className="absolute inset-0 rounded-full border-4 border-indigo-500" style={{ clipPath: `polygon(0 0, 100% 0, 100% ${percentage}%, 0 ${percentage}%)`, opacity: 0.2 }}></div>
                 <div className={`text-4xl font-bold math-num ${colorClass}`}>{score}<span className="text-xl text-gray-400">/{testData.length}</span></div>
              </div>
              
              <h2 className={`text-2xl font-bold mb-2 ${colorClass}`}>{message}</h2>
              <p className="text-gray-500 mb-8">ระดับ: <span className="font-semibold uppercase">{testConfig.difficulty}</span></p>

              <div className="space-y-3">
                <button onClick={startTest} className="w-full py-4 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-2xl font-bold transition-colors flex justify-center items-center">
                  <Icon name={icons.RotateCcw} size={20} className="mr-2" /> ลองทำใหม่อีกครั้ง
                </button>
                <button onClick={() => setCurrentScreen('home')} className="w-full py-4 bg-indigo-600 text-white hover:bg-indigo-700 rounded-2xl font-bold shadow-md transition-colors flex justify-center items-center">
                  <Icon name={icons.Home} size={20} className="mr-2" /> กลับหน้าหลัก
                </button>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="antialiased font-thai selection:bg-indigo-200 selection:text-indigo-900">
          {currentScreen === 'home' && renderHome()}
          {currentScreen === 'learn' && renderLearn()}
          {currentScreen === 'setupTest' && renderTestSetup()}
          {currentScreen === 'testing' && renderTesting()}
          {currentScreen === 'result' && renderResult()}
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
